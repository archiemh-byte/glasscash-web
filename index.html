<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassCash | Decentralized OOH Media</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a192f;
            color: #e6f1ff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px 20px;
            width: 100%; 
            box-sizing: border-box;
        }
        .logo-img {
            width: 140px; 
            height: auto;
            margin-bottom: 25px;
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); 
        }
        h1 {
            font-size: 2.5rem;
            color: #e6f1ff;
            margin: 0 0 15px 0;
            letter-spacing: -0.5px;
        }
        p.tagline {
            font-size: 1.2rem;
            color: #8892b0;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
            background-color: rgba(17, 34, 64, 0.5); 
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #233554;
        }
        label {
            color: #8892b0;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: -5px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            background-color: #0a192f;
            border: 1px solid #495670;
            color: #e6f1ff;
            border-radius: 4px;
            font-family: inherit;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #64ffda;
        }
        .btn {
            background-color: transparent;
            color: #64ffda;
            border: 1px solid #64ffda;
            padding: 15px 30px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }
        .footer {
            margin-top: 40px;
            color: #495670;
            font-size: 0.85rem;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="GlassCash Logo" class="logo-img">
        
        <h1>GLASSCASH</h1>
        <p class="tagline">Turning residential windows into premium brand inventory.</p>
        
        <form action="https://formspree.io/f/mpqbbvgj" method="POST">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required placeholder="e.g. John Doe">

            <label for="contact">Phone Number or Email</label>
            <input type="text" id="contact" name="contact" required placeholder="To contact you about hosting">

            <label for="address">Address in September 2026</label>
            <textarea id="address" name="address" rows="2" required placeholder="Street name and area"></textarea>

            <button type="submit" class="btn">Join Waitlist</button>
        </form>
    </div>

    <div class="footer">
        glasscash.co.uk
    </div>

</body>
</html>
