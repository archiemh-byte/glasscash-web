<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassCash | Street-Level Media</title>
    <style>
        :root {
            --navy: #0a192f;
            --teal: #64ffda;
            --white: #e6f1ff;
        }
        body {
            background-color: var(--navy);
            color: var(--white);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        .logo-frame {
            border: 2px solid var(--white);
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
        }
        .logo-corner {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--navy);
            padding: 2px;
            color: var(--teal);
        }
        h1 { font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 10px; }
        p { color: #8892b0; line-height: 1.6; font-size: 1.1rem; }
        .cta-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            border: 1px solid var(--teal);
            color: var(--teal);
            text-decoration: none;
            border-radius: 4px;
            transition: 0.3s;
        }
        .cta-button:hover {
            background: rgba(100, 255, 218, 0.1);
        }
        footer { margin-top: 50px; font-size: 0.8rem; color: #495670; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-frame">
            GC
            <div class="logo-corner">$</div>
        </div>
        <h1>GlassCash</h1>
        <p>Turning residential windows into premium brand inventory.<br>
        Zero damage. Weekly verification. Passive income.</p>
        
        <p><strong>September 2026 Pilot: University Sailing Club</strong></p>
        
        <a href="mailto:archie@glasscash.co.uk" class="cta-button">Contact Founder</a>
        
        <footer>© 2026 GlassCash Media UK. Built in Swansea.</footer>
    </div>
</body>
</html>
