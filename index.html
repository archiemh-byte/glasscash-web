<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassCash | Decentralized OOH Media</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a192f;
            color: #e6f1ff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px 20px;
        }
        .logo-img {
            width: 140px; /* Adjust this number to make the logo larger or smaller */
            height: auto;
            margin-bottom: 25px;
            border-radius: 16px; /* Smooths the edges slightly to blend with the background */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); /* Adds a premium shadow effect */
        }
        h1 {
            font-size: 2.5rem;
            color: #e6f1ff;
            margin: 0 0 15px 0;
            letter-spacing: -0.5px;
        }
        p.tagline {
            font-size: 1.2rem;
            color: #8892b0;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            background-color: transparent;
            color: #64ffda;
            border: 1px solid #64ffda;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }
        .footer {
            position: absolute;
            bottom: 20px;
            color: #495670;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="GlassCash Logo" class="logo-img">
        
        <h1>GLASSCASH</h1>
        <p class="tagline">Turning residential windows into premium brand inventory.</p>
        
        <a href="mailto:archie@glasscash.co.uk" class="btn">Contact Founder</a>
    </div>

    <div class="footer">
        glasscash.co.uk
    </div>

</body>
</html>
